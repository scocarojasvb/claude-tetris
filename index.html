<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <aside class="panel panel-left">
        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>C</kbd> reservar</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section records">
          <span class="label">TOP 5</span>
          <ol id="records-list" class="records-list"></ol>
          <div class="records-stats">
            <span>Mejor combo: <strong id="best-combo">0</strong></span>
            <span>Máx. líneas: <strong id="best-lines">0</strong></span>
          </div>
          <button id="reset-records-btn" class="reset-btn">Resetear récords</button>
        </div>
      </aside>

      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">HOLD</span>
          <canvas id="hold-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section theme-toggle">
          <span class="label">LIGHT MODE</span>
          <label class="switch">
            <input type="checkbox" id="theme-toggle" />
            <span class="switch-slider"></span>
          </label>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="overlay-new-record" class="new-record hidden">
          <p class="new-record-label">¡Nuevo récord! Ingresa tu nombre:</p>
          <input id="player-name" type="text" maxlength="10" placeholder="Nombre" autocomplete="off" />
          <button id="save-record-btn">Guardar</button>
        </div>

        <div class="overlay-records">
          <span class="label">TOP 5</span>
          <ol id="overlay-records-list" class="records-list"></ol>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
